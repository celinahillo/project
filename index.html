
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>

      <a-assets>
        <img id="brickwall" src="brick.jpg">
        <img id="brickwall2" src="darkbrick.jpg">
      </a-assets>

      <!-- Entrance wall-->
      <a-box position="0 5 -44" width="90" height="9"></a-box>
      <!-- Door -->
      <a-box position="0 4 -43" width="10" height="7" color="green"></a-box>

      <!-- left wall -->
      <a-box position="-40 5 -30" rotation="0 90 0" width="100" height="9"></a-box>
       <!-- Right wall -->
      <a-box position="40 5 -30" rotation="0 90 0" width="100" height="9"></a-box>
    
      <!-- End wall-->
      <a-box position="0 5 20" width="90" height="9"></a-box>

      <!-- Inside 1 -->
      <a-box position="0 2 -30" width="12" height="8" src="brick.jpg" repeat="2 2"></a-box>
       <a-box position="4 2 -17.6" width="8" height="8" src="brick.jpg" repeat="2 2"></a-box>
      <!-- left -->
      <a-box position="-6 2 -24" rotation="0 90 0" width="12" height="8" src="darkbrick.jpg" repeat="2 2"></a-box>
      <a-box position="8 2 -22" rotation="0 90 0" width="10" height="8" src="darkbrick.jpg" repeat="2 2"></a-box>
      <!-- edge detail -->
       <a-box position="-6.5 2 -30.5" width="1" height="9"color="yellow"></a-box>
       <a-box position="-5.5 2 -29" width="1" height="9"color="green"></a-box>
       <a-box position="-5.9 2 -30" width="1" height="9"color="blue"></a-box>

       <a-box position="-6 2 -18" width="1" height="9"color="green"></a-box>

       <a-entity position="13.4 0 12">
       <a-box position="-6.4 2 -30.5" width="1" height="9"color="yellow"></a-box>
       <a-box position="-5.5 2 -29" width="1" height="9"color="green"></a-box>
       <a-box position="-5.9 2 -30" width="1" height="9"color="blue"></a-box>
       </a-entity>

      <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" src="sanddirtfloor.jpg" repeat="15 15"></a-plane>

     <a-sky color="white"></a-sky>  
     <a-camera position="0 5 0"></a-camera>

    </a-scene>
  </body>
</html>
